name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install -q openai pytest

      - name: Run unit tests
        run: pytest tests/ -v

  self-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      models: read
    steps:
      - uses: actions/checkout@v4

      - name: Scan this repo
        uses: ./
        with:
          path: '.'
          fail-on-severity: 'HIGH'
          use-llm-judge: 'true'
